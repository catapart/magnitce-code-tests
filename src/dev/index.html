<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }

        html {
            color-scheme: light dark;
        }

        body {
            display: grid;
            overflow: hidden;
        }

        test-runner::part(subject)
        {
            width: 350px;
        }

        code-tests
        {
            /* max-width: 350px; */
        }
    </style>
</head>

<body>
    <test-runner>
      <!-- <code-tests src="./tests/before-after.tests.ts" label="code-tests element"></code-tests> -->
        <code-tests id="target" label="Direct Access" ordered="false" src="./tests/direct-access.tests.ts" ></code-tests>
        <code-tests id="target" label="Result Types" ordered="false" src="./tests/result-types.tests.ts" ></code-tests>
        <div id="subject">
        <code-tests id="target" label="Direct Access" ordered="false" src="./tests/direct-access.tests.ts" ></code-tests>
        </div>
    </test-runner>
    <!-- don't want circular depenency in npm packages, so test runner is packaged and deployed, instead -->
    <!-- <script type="module" src="/libs/test-runner.min.js"></script> -->
    <script type="module" src="./dev.ts"></script>
</body>

</html>
